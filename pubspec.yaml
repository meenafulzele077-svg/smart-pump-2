name: smart_pump_2
description: "Smart Pump 2.0 - Premium remote irrigation & pump control app for Indian farmers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Firebase (Cloud Messaging)
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1

  # Charts
  fl_chart: ^0.68.0

  # Biometric auth
  local_auth: ^2.3.0

  # Camera / gallery capture for crop-disease scanning
  image_picker: ^1.1.2

  # Icons & fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.20.2
  animations: ^2.0.11
  shimmer: ^3.0.0
  lottie: ^3.1.2
  pin_code_fields: ^8.0.1
  fluttertoast: ^8.2.6
  connectivity_plus: ^6.0.3
  percent_indicator: ^4.2.3
  syncfusion_flutter_gauges: ^26.1.35

  # Export
  pdf: ^3.11.0
  printing: ^5.13.1
  share_plus: ^9.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
